services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mrducky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mrducky
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrducky"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
    environment:
      DATABASE_URL: postgresql+psycopg://mrducky:${POSTGRES_PASSWORD}@postgres:5432/mrducky
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PIN_HASH: ${ADMIN_PIN_HASH}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOCARDLESS_SECRET_ID: ${GOCARDLESS_SECRET_ID:-}
      GOCARDLESS_SECRET_KEY: ${GOCARDLESS_SECRET_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ../app
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy


volumes:
  pgdata:
